name: M2_Auto_Update_Final_Python
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager
          sudo apt-get install -y google-chrome-stable imagemagick

      - name: Run Python Script
        run: |
          python - << 'EOF'
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          options = Options()
          options.add_argument('--headless')
          options.add_argument('--no-sandbox')
          options.add_argument('--disable-gpu')
          options.add_argument('--window-size=1600,1400')
          # 關鍵：隱藏自動化特徵，防止跳回首頁
          options.add_argument('--disable-blink-features=AutomationControlled')
          options.add_experimental_option("excludeSwitches", ["enable-automation"])
          options.add_experimental_option('useAutomationExtension', False)

          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
          # 徹底移除 webdriver 標記
          driver.execute_cdp_cmd("Page.addScriptToEvaluateOnNewDocument", {
            "source": "Object.defineProperty(navigator, 'webdriver', {get: () => undefined})"
          })

          try:
              print("1. 先去首頁混淆視聽...")
              driver.get('https://bitcoincounterflow.com')
              time.sleep(5)
              
              print("2. 強制跳轉至圖表頁...")
              driver.get('https://bitcoincounterflow.comcharts/m2-global/')
              
              print("3. 等待渲染 (60s)...")
              time.sleep(60)
              
              # 再次確認網址，如果還是首頁，就再試一次
              if "m2-global" not in driver.current_url:
                  print("檢測到跳轉，執行二次重導...")
                  driver.get('https://bitcoincounterflow.comcharts/m2-global/')
                  time.sleep(30)
              
              driver.save_screenshot('full.png')
              print("截圖成功！")
          finally:
              driver.quit()
          EOF

      - name: Crop and Post
        run: |
          # 裁切中間大區塊：寬1400x高1100，左偏200, 上偏20 (包含標題、數據、年份)
          convert full.png -crop 1400x1100+200+20 chart.png
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC**\"}" ${{ secrets.DISCORD_WEBHOOK }}
