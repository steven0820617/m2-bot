name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            // 關鍵 1：關閉硬體加速，解決空白截圖問題
            const browser = await chromium.launch({ 
              args: ['--disable-gpu', '--disable-software-rasterizer', '--no-sandbox'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 }
            });
            const page = await context.newPage();
            
            try {
              console.log('1. 前往圖表頁面...');
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'networkidle', 
                timeout: 90000 
              });

              // 關鍵 2：解決跳回首頁問題 (若網址不對，強制再跳一次)
              if (!page.url().includes('m2-global')) {
                console.log('偵測到跳轉，重新導向目標頁面...');
                await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
              }

              // 關鍵 3：模擬捲動觸發渲染
              await page.evaluate(() => window.scrollTo(0, 400));
              
              console.log('2. 等待圖表完全渲染 (45秒)...');
              await page.waitForTimeout(45000); 

              // 關鍵 4：精確捕捉包含標題與數據的圖表區塊
              const selector = '.chart-main-container, .chart-container';
              const chart = await page.$(selector);
              
              if (chart) {
                await chart.screenshot({ path: 'chart.png' });
                console.log('成功截取圖表區塊！');
              } else {
                // 備份方案：截取網頁中央區域
                await page.screenshot({ path: 'chart.png', clip: { x: 0, y: 100, width: 1600, height: 900 } });
              }
            } catch (e) {
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run
        run: node screenshot.js

      - name: Post
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表更新**\"}" ${{ secrets.DISCORD_WEBHOOK }}
