name: M2_Auto_Update

on:
  schedule:
    - cron: '0 0 * * 2' # 每週二 台北時間 08:00
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        env:
          # 【修正 1】正確的圖表子分頁 URL
          TARGET_URL: https://bitcoincounterflow.com/charts/m2-global/
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });
            const OUT = 'chart.png';
            let page;

            try {
              const context = await browser.newContext({
                viewport: { width: 1920, height: 1200 },
                deviceScaleFactor: 2,
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
              });

              page = await context.newPage();
              page.setDefaultTimeout(90000);

              console.log('1. 前往頁面:', process.env.TARGET_URL);
              await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 90000 });

              console.log('2. 定位標題並等待渲染...');
              // 【優化 1】更穩定的標題定位邏輯
              const title = page.locator('h1, h2').filter({ hasText: 'M2' }).first();
              await title.waitFor({ state: 'visible', timeout: 30000 }).catch(() => null);
              
              // 補償等待時間確保 Canvas 繪圖完成
              await page.waitForTimeout(25000);

              const box = await title.boundingBox();
              const vp = page.viewportSize();

              if (box && vp) {
                console.log('3. 執行精確區域裁切...');
                await page.mouse.move(0, 0); 
                await page.screenshot({
                  path: OUT,
                  clip: {
                    x: 0,
                    y: Math.max(0, box.y - 120), // 從標題上方預留空間
                    width: vp.width,
                    height: Math.min(vp.height, 1100) // 動態高度，涵蓋圖表與說明
                  },
                  animations: 'disabled'
                });
                console.log('區域截圖成功。');
              } else {
                console.log('3. 定位失敗，執行全螢幕保底...');
                await page.screenshot({ path: OUT, fullPage: true, animations: 'disabled' });
              }

            } catch (err) {
              console.error('嚴重錯誤:', err);
              if (page) {
                await page.screenshot({ path: OUT, fullPage: true, animations: 'disabled' }).catch(() => {});
              }
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

          node screenshot.js

      - name: Send to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TARGET_URL: https://bitcoincounterflow.com/charts/m2-global/
        run: |
          if [ -s chart.png ]; then
            # 【修正 2】使用 ` ` 包圍網址：Discord 會顯示為不可點擊的純文字 Code Block
            curl --fail-with-body -sS \
              -F "file=@chart.png" \
              -F "payload_json={\"content\":\"\`${{ env.TARGET_URL }}\`\"}" \
              "$DISCORD_WEBHOOK"
          else
            echo "未發現截圖，跳過發送。"
            exit 1
          fi
