name: M2_Auto_Update_BotPass
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            // 使用 stealth 模式的參數啟動
            const browser = await chromium.launch({ 
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-blink-features=AutomationControlled'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 },
              locale: 'zh-TW',
              timezoneId: 'Asia/Taipei'
            });
            const page = await context.newPage();
            
            // 隱藏自動化標記
            await page.addInitScript(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
            });

            try {
              console.log('1. 前往網站首頁進行「預熱」...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
              await page.waitForTimeout(5000);

              console.log('2. 導向目標圖表頁面...');
              await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'domcontentloaded', timeout: 90000 });
              
              // 模擬真人的微幅捲動與滑鼠移動，觸發圖表渲染
              console.log('3. 模擬真人行為中...');
              await page.mouse.move(500, 500);
              await page.evaluate(() => window.scrollTo(0, 300));
              await page.waitForTimeout(2000);
              await page.evaluate(() => window.scrollTo(0, 600));

              console.log('4. 等待數據加載 (45秒)...');
              await page.waitForTimeout(45000); 

              // 精確定位圖表區域
              const chart = await page.$('.chart-container') || await page.$('.highcharts-container');
              if (chart) {
                await chart.screenshot({ path: 'chart.png' });
                console.log('截圖完成！');
              } else {
                // 如果找不到區塊，截取整個中段畫面
                await page.screenshot({ path: 'chart.png', clip: { x: 0, y: 150, width: 1600, height: 850 } });
              }
            } catch (e) {
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run
        run: node screenshot.js

      - name: Post
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 自動更新**\"}" ${{ secrets.DISCORD_WEBHOOK }}
