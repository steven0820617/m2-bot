name: M2_Auto_Update

on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        env:
          TARGET_URL: https://bitcoincounterflow.com/charts/m2-global/
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');

          const OUT = path.resolve('chart.png');
          const URL = process.env.TARGET_URL;

          (async () => {
            let browser;
            let page;

            try {
              browser = await chromium.launch({
                headless: true,
                args: ['--disable-dev-shm-usage']
              });

              const context = await browser.newContext({
                viewport: { width: 1920, height: 1080 },
                deviceScaleFactor: 2,
                locale: 'zh-TW',
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
              });

              page = await context.newPage();
              page.setDefaultTimeout(60000);

              console.log('Opening:', URL);
              await page.goto(URL, {
                waitUntil: 'domcontentloaded',
                timeout: 60000
              });

              await page.waitForTimeout(12000);

              // 盡量等到頁面標題或主要內容出現
              await page.locator('body').waitFor({ state: 'visible', timeout: 30000 }).catch(() => {});
              await page.waitForTimeout(3000);

              // 主截圖：完整頁面
              try {
                await page.screenshot({
                  path: OUT,
                  fullPage: true,
                  animations: 'disabled',
                  caret: 'hide'
                });
                console.log('Primary screenshot saved:', OUT);
              } catch (err1) {
                console.error('Primary screenshot failed:', err1);

                // 備援截圖：目前可視區
                await page.screenshot({
                  path: OUT,
                  fullPage: false,
                  animations: 'disabled',
                  caret: 'hide'
                });
                console.log('Fallback screenshot saved:', OUT);
              }

              if (!fs.existsSync(OUT) || fs.statSync(OUT).size === 0) {
                throw new Error('chart.png not created or empty');
              }
            } catch (err) {
              console.error('Screenshot pipeline failed:', err);

              // 最後備援：若頁面還活著，再試一次可視區截圖
              try {
                if (page && !page.isClosed()) {
                  await page.screenshot({
                    path: OUT,
                    fullPage: false,
                    animations: 'disabled',
                    caret: 'hide'
                  });
                }
              } catch (err2) {
                console.error('Final fallback failed:', err2);
              }

              if (!fs.existsSync(OUT) || fs.statSync(OUT).size === 0) {
                process.exitCode = 1;
                return;
              }
            } finally {
              if (browser) {
                await browser.close().catch(() => {});
              }
            }
          })();
          EOF

          node screenshot.js

      - name: Send to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail

          if [ ! -s chart.png ]; then
            echo "chart.png 不存在或為空，停止上傳"
            exit 1
          fi

          curl --fail-with-body -sS \
            -F "file=@chart.png" \
            -F 'payload_json={"content":"https://bitcoincounterflow.com/charts/m2-global/"}' \
            "$DISCORD_WEBHOOK"
