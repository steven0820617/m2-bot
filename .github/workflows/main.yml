name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Create Screenshot Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1440, height: 1080 }
            });
            const page = await context.newPage();
            try {
              console.log('1. 導向目標頁面...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle', timeout: 90000 });
              
              console.log('2. 等待圖表元件...');
              const chart = page.locator('.chart-container, .highcharts-container').first();
              await chart.waitFor({ state: 'visible', timeout: 30000 });
              await page.waitForTimeout(5000); // 確保動畫跑完

              console.log('3. 精確截取圖表區塊...');
              await chart.screenshot({ path: 'chart.png' });
            } catch (e) {
              console.error('偵測失敗:', e);
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run Screenshot Script
        run: node screenshot.js

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表更新**\"}" ${{ secrets.DISCORD_WEBHOOK }}
