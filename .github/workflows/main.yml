name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 }
            });
            const page = await context.newPage();
            try {
              console.log('1. 先進入首頁以獲得 Cookie...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
              await page.waitForTimeout(5000);

              console.log('2. 模擬真人跳轉至圖表頁面...');
              // 使用強行跳轉，繞過伺服器的直接連結攔截
              await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'networkidle', timeout: 90000 });
              
              // 3. 關鍵：如果網址被踢回首頁，強制再跳一次
              if (!page.url().includes('m2-global')) {
                 console.log('檢測到跳轉回首頁，執行二次強行跳轉...');
                 await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'domcontentloaded' });
              }

              console.log('3. 等待圖表數據加載 (45秒)...');
              await page.waitForTimeout(45000); 

              // 4. 定位圖表容器
              const chartElement = await page.$('.chart-container') || await page.$('.highcharts-container');
              
              if (chartElement) {
                await chartElement.screenshot({ path: 'chart.png' });
                console.log('成功截取圖表區塊！');
              } else {
                // 最終保險：直接針對圖表所在的座標區域截圖
                await page.screenshot({ path: 'chart.png', clip: { x: 260, y: 10, width: 1340, height: 800 } });
              }
            } catch (e) {
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run
        run: node screenshot.js

      - name: Post
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表更新**\"}" ${{ secrets.DISCORD_WEBHOOK }}
