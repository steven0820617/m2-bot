name: M2_Auto_Update
on:
  schedule:
    - cron: '50 9 * * *'  # 每天 UTC 00:00 (台灣早上 08:00) 自動執行
  workflow_dispatch:      # 允許手動點擊測試

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Create Screenshot Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            // 模擬真人瀏覽器，避免被網站偵測為機器人而跳回首頁
            const browser = await chromium.launch();
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1440, height: 1080 }
            });
            const page = await context.newPage();
            
            try {
              console.log('正在前往圖表頁面...');
              // 前往目標網址，等待網路閒置
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'networkidle', 
                timeout: 90000 
              });

              // 強制等待 20 秒，確保動態圖表完全渲染
              await new Promise(r => setTimeout(r, 20000)); 

              // 檢查是否還在圖表頁面，若被踢回首頁則重試一次
              if (!page.url().includes('m2-global')) {
                console.log('檢測到網頁跳轉，嘗試第二次進入...');
                await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
                await new Promise(r => setTimeout(r, 15000));
              }

              // 嘗試精確截取圖表區塊 (.chart-container)
              const chart = await page.$('.chart-container');
              if (chart) {
                await chart.screenshot({ path: 'chart.png' });
                console.log('成功截取圖表區域！');
              } else {
                // 如果找不到區塊，則截取當前頁面
                await page.screenshot({ path: 'chart.png' });
                console.log('找不到特定區域，已截取當前畫面。');
              }
            } catch (e) {
              console.error('發生錯誤:', e);
              await page.screenshot({ path: 'chart.png' }); // 錯誤時也截一張圖留存
            }
            await browser.close();
          })();
          EOF

      - name: Run Screenshot Script
        run: node screenshot.js

      - name: Post to Discord
        run: |
          # 從 GitHub Secret 讀取 Webhook 網址並發送圖片
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs Bitcoin 最新圖表更新 (每日自動)**\"}" ${{ secrets.DISCORD_WEBHOOK }}
