name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Create Screenshot Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 }
            });
            const page = await context.newPage();
            try {
              console.log('1. 進入首頁...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
              await page.waitForTimeout(5000);
              console.log('2. 跳轉圖表頁...');
              await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'networkidle' });
              console.log('3. 等待渲染 (30秒)...');
              await page.waitForTimeout(30000);
              // 直接針對網頁中段截圖，避開找不到元件的問題
              await page.screenshot({ path: 'chart.png', clip: { x: 0, y: 200, width: 1600, height: 800 } });
              console.log('截圖完成！');
            } catch (e) {
              console.error(e);
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run Screenshot Script
        run: node screenshot.js

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表**\"}" ${{ secrets.DISCORD_WEBHOOK }}
