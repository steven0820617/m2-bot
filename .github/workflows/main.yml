name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            // 啟動瀏覽器
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 }
            });
            const page = await context.newPage();
            
            // 設定全域超時為 90 秒，避免 GitHub 環境過慢
            page.setDefaultTimeout(90000);

            try {
              console.log('1. 直接前往目標圖表頁面...');
              // waitUntil: 'networkidle' 會等待所有數據請求（API/圖表數據）完成
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'networkidle',
                timeout: 90000 
              });

              console.log('2. 注入 CSS 強制渲染並移除干擾元素...');
              await page.addStyleTag({ 
                content: `
                  * { font-family: sans-serif !important; transition: none !important; animation: none !important; }
                  .qc-cmp2-container, #qc-cmp2-container { display: none !important; } /* 隱藏 Cookie 彈窗 */
                ` 
              });

              console.log('3. 等待圖表容器元件出現...');
              // 針對該站點的圖表容器進行定位
              const selector = '.chart-main-container, .highcharts-container, #chart-container';
              await page.waitForSelector(selector, { state: 'visible', timeout: 30000 });

              console.log('4. 額外停頓 15 秒，確保 Canvas 繪圖動畫跑完...');
              await page.waitForTimeout(15000);

              // 檢查是否有找到具體圖表區域
              const chart = await page.$('.chart-main-container') || await page.$('.highcharts-container');
              
              if (chart) {
                console.log('5. 執行局部截圖...');
                await chart.screenshot({ path: 'chart.png', animations: 'disabled' });
              } else {
                console.log('5. 找不到特定容器，改為全螢幕截圖...');
                await page.screenshot({ path: 'chart.png', animations: 'disabled' });
              }
              console.log('截圖流程完成！');

            } catch (e) {
              console.error('執行失敗：', e.message);
              // 失敗保底：抓一張全螢幕照片確認畫面狀態（是否卡在登入或廣告）
              await page.screenshot({ path: 'chart.png', fullPage: true, animations: 'disabled' });
            }

            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          if [ -f chart.png ]; then
            curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📈 **M2 Global Supply Growth 自動更新**\n\`https://bitcoincounterflow.com\`\"}" ${{ secrets.DISCORD_WEBHOOK }}
          else
            echo "找不到截圖檔案，無法發送至 Discord。"
          fi
