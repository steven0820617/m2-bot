name: M2_Auto_Update

on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        env:
          TARGET_URL: https://bitcoincounterflow.com/charts/m2-global/
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');

          const OUT = path.resolve('chart.png');
          const URL = process.env.TARGET_URL;

          (async () => {
            let browser;

            try {
              browser = await chromium.launch({
                headless: true,
                args: ['--disable-dev-shm-usage']
              });

              const context = await browser.newContext({
                viewport: { width: 1920, height: 1080 },
                deviceScaleFactor: 2,
                locale: 'zh-TW',
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
              });

              const page = await context.newPage();
              page.setDefaultTimeout(60000);

              console.log('Opening:', URL);
              await page.goto(URL, {
                waitUntil: 'domcontentloaded',
                timeout: 60000
              });

              await page.waitForTimeout(12000);

              await page.screenshot({
                path: OUT,
                fullPage: true,
                animations: 'disabled',
                caret: 'hide'
              });

              if (!fs.existsSync(OUT) || fs.statSync(OUT).size === 0) {
                throw new Error('chart.png not created or empty');
              }
            } catch (err) {
              console.error('Screenshot pipeline failed:', err);
              process.exitCode = 1;
            } finally {
              if (browser) {
                await browser.close().catch(() => {});
              }
            }
          })();
          EOF

          node screenshot.js

      - name: Send to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail

          if [ ! -s chart.png ]; then
            echo "chart.png 不存在或為空，停止上傳"
            exit 1
          fi

          curl --fail-with-body -sS \
            -F "file=@chart.png" \
            -F 'payload_json={"content":"https://bitcoincounterflow.com/charts/m2-global/"}' \
            "$DISCORD_WEBHOOK"
