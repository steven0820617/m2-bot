name: M2_Auto_Update

on:
  schedule:
    - cron: '0 0 * * 2' # 每週二 台北時間 08:00
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        env:
          TARGET_URL: https://bitcoincounterflow.com
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });
            const OUT = 'chart.png';
            let page;

            try {
              const context = await browser.newContext({
                viewport: { width: 1920, height: 1080 },
                deviceScaleFactor: 2,
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
              });

              page = await context.newPage();
              page.setDefaultTimeout(90000);

              console.log('1. 前往目標頁面:', process.env.TARGET_URL);
              await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 90000 });

              console.log('2. 等待圖表元件出現...');
              const selector = '.chart-main-container';
              // Non-blocking 等待：若找不到元件不崩潰，返回 null
              const chartExists = await page.waitForSelector(selector, { state: 'visible', timeout: 25000 })
                .catch(() => null);

              // 額外等待確保 Highcharts 數據渲染
              await page.waitForTimeout(15000);

              const chart = await page.$(selector);
              if (chart && chartExists) {
                console.log('3. 執行局部圖表截圖...');
                await page.mouse.move(0, 0);
                await chart.screenshot({ path: OUT, animations: 'disabled' });
              } else {
                console.log('3. 找不到容器，執行流程內保底截圖...');
                await page.screenshot({ path: OUT, fullPage: true, animations: 'disabled' });
              }
              console.log('流程順利完成。');

            } catch (err) {
              console.error('執行過程中發生嚴重錯誤:', err);
              // 【最終保險修正】若上述流程完全爆掉，嘗試在退出前抓一張全螢幕圖
              if (page) {
                try {
                  await page.screenshot({ path: OUT, fullPage: true, animations: 'disabled' });
                  console.log('Final exception fallback screenshot taken.');
                } catch (e) {
                  console.error('Final fallback failed.');
                }
              }
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

          node screenshot.js

      - name: Send to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TARGET_URL: https://bitcoincounterflow.com
        run: |
          if [ -s chart.png ]; then
            # 使用 < > 包圍網址：可點擊，但強行關閉 Discord 的網頁預覽卡片
            curl --fail-with-body -sS \
              -F "file=@chart.png" \
              -F "payload_json={\"content\":\"<${{ env.TARGET_URL }}>\"}" \
              "$DISCORD_WEBHOOK"
          else
            echo "錯誤：找不到截圖檔案，跳過發送。"
            exit 1
          fi
