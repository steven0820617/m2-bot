name: M2_Auto_Update

on:
  schedule:
    - cron: '17 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        env:
          # 【核對：絕對正確的目標網址】
          TARGET_URL: https://bitcoincounterflow.com/charts/m2-global/
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });
            const OUT = 'chart.png';
            let page;

            try {
              const context = await browser.newContext({
                viewport: { width: 1920, height: 1080 },
                deviceScaleFactor: 2,
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
              });

              page = await context.newPage();
              // 設定 3 分鐘超時，給予 2 分鐘等待充足空間
              page.setDefaultTimeout(180000); 

              console.log('1. 前往正確頁面:', process.env.TARGET_URL);
              await page.goto(process.env.TARGET_URL, { waitUntil: 'networkidle', timeout: 180000 });

              console.log('2. 【加強等待】等待圖表渲染 120 秒 (2 分鐘)...');
              // 等待 120,000 毫秒 (2 分鐘)
              await page.waitForTimeout(120000); 

              console.log('3. 執行全網頁擷取...');
              await page.mouse.move(0, 0); 
              await page.screenshot({
                path: OUT,
                fullPage: true,      
                animations: 'disabled'
              });
              console.log('全網頁截圖完成。');

            } catch (err) {
              console.error('執行失敗:', err);
              if (page) {
                try {
                  await page.screenshot({ path: OUT, fullPage: true, animations: 'disabled' });
                } catch (e) {}
              }
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

          node screenshot.js

      - name: Send to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # 【核對：Discord 發送的網址同步修正】
          TARGET_URL: https://bitcoincounterflow.com/charts/m2-global/
        run: |
          if [ -s chart.png ]; then
            # 使用 ` ` 包圍網址：Discord 顯示為灰色不可點擊純文字，且無預覽
            curl --fail-with-body -sS \
              -F "file=@chart.png" \
              -F "payload_json={\"content\":\"\`${{ env.TARGET_URL }}\`\"}" \
              "$DISCORD_WEBHOOK"
          else
            echo "找不到截圖檔案。"
            exit 1
          fi
