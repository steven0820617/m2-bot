name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            // 啟動瀏覽器並設定高解析度寬螢幕視窗
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 },
              deviceScaleFactor: 2 // 提高清晰度
            });
            const page = await context.newPage();
            page.setDefaultTimeout(90000);

            try {
              console.log('1. 前往 M2 圖表頁面...');
              // 等待網路完全空閒，確保數據 API 請求完成
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'networkidle',
                timeout: 90000 
              });

              console.log('2. 注入 CSS 優化佈局並隱藏干擾...');
              await page.addStyleTag({ 
                content: `
                  /* 停用外部字體避免卡死，並隱藏 Cookie 視窗與廣告 */
                  * { font-family: sans-serif !important; transition: none !important; animation: none !important; }
                  .qc-cmp2-container, #qc-cmp2-container { display: none !important; }
                  /* 強制圖表容器全寬，防止右側數據被擠壓 */
                  .chart-main-container, .highcharts-container { width: 100% !important; max-width: none !important; }
                ` 
              });

              console.log('3. 等待圖表元件出現在畫面上...');
              const selector = '.chart-main-container, .highcharts-container';
              await page.waitForSelector(selector, { state: 'visible', timeout: 30000 });
              
              console.log('4. 額外等待 20 秒，確保 Canvas 動畫與線條渲染完成...');
              await page.waitForTimeout(20000);

              // 定位具體的圖表區域
              const chart = await page.$(selector);
              
              if (chart) {
                console.log('5. 執行局部截圖...');
                // 截圖前將滑鼠移開，避免觸發數據提示框 (Tooltip)
                await page.mouse.move(0, 0); 
                await chart.screenshot({ path: 'chart.png', animations: 'disabled' });
                console.log('成功擷取完整圖表！');
              } else {
                throw new Error('找不到圖表容器');
              }

            } catch (e) {
              console.error('偵錯失敗：', e.message);
              // 失敗保底：抓全螢幕確認當前頁面狀態
              await page.screenshot({ path: 'chart.png', fullPage: true, animations: 'disabled' });
            }

            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          if [ -f chart.png ]; then
            curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📈 **M2 Global Supply Growth 自動更新**\n\`https://bitcoincounterflow.com\`\"}" ${{ secrets.DISCORD_WEBHOOK }}
          else
            echo "未產生截圖檔案。"
          fi
