name: M2_Auto_Update_Final_V10
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
        run: |
          # 1. 安裝環境
          npm install playwright
          npx playwright install chromium --with-deps
          
          # 2. 建立腳本 (優化定位與渲染等待)
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ 
              args: ['--no-sandbox', '--disable-gpu', '--disable-software-rasterizer'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 } // 使用標準 Full HD 確保佈局正確
            });
            const page = await context.newPage();
            try {
              console.log('正在導航至圖表頁面...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle', timeout: 90000 });
              
              // 模擬捲動並等待 60 秒
              await page.evaluate(() => window.scrollTo(0, 400));
              await page.waitForTimeout(60000); 

              // 【智慧定位：精確鎖定圖表容器】
              // 該網站的核心圖表位於 .highcharts-container 或 .chart-container
              const selector = '.highcharts-container, .chart-container, #chart-container';
              const chart = await page.locator(selector).first();
              
              console.log('執行精確截圖...');
              await chart.screenshot({ 
                path: 'chart.png',
                timeout: 0 
              });
              console.log('截圖儲存成功！');
            } catch (e) {
              console.error('定位失敗，截取中段區域作為備份:', e.message);
              await page.screenshot({ path: 'chart.png', clip: { x: 260, y: 100, width: 1340, height: 850 } });
            }
            await browser.close();
          })();
          EOF
          
          # 3. 執行腳本
          node screenshot.js

      - name: Post to Discord
        run: |
          # 使用反引號 ` 包住網址，使其在 Discord 顯示為純文字，不產生連結
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"\`https://bitcoincounterflow.com\`\"}" ${{ secrets.DISCORD_WEBHOOK }}
