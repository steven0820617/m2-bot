name: M2_Auto_Update_FullRange
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get install -y imagemagick

      - name: Capture Page
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ args: ['--no-sandbox', '--disable-gpu'] });
            const page = await browser.newPage();
            // 增加視窗高度，確保底部年份能被渲染
            await page.setViewportSize({ width: 1600, height: 1400 });
            try {
              console.log('1. 進入首頁...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
              await page.waitForTimeout(5000);

              console.log('2. 切換至圖表頁...');
              await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'networkidle', timeout: 90000 });
              
              // 3. 關鍵：稍微捲動並等待 60 秒，確保所有數據線條與年份刻度畫出來
              await page.evaluate(() => window.scrollTo(0, 50)); 
              await page.waitForTimeout(60000); 

              await page.screenshot({ path: 'full.png' });
              console.log('原始全截取成功');
            } catch (e) {
              await page.screenshot({ path: 'full.png' });
            }
            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Crop Full Area
        run: |
          # 修正裁切範圍：
          # 寬 1400x 高 1000 (增加高度以包含年份)
          # 左偏 200, 上偏 20 (向上移動以包含頂部數據)
          convert full.png -crop 1400x1000+200+20 chart.png
          echo "完整範圍裁切完成"

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 每日更新 (完整數據版)**\"}" ${{ secrets.DISCORD_WEBHOOK }}
