name: M2_Auto_Update_Link_Only
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
        run: |
          # 1. 安裝環境
          npm install playwright
          npx playwright install chromium --with-deps
          
          # 2. 建立腳本 (確保包含標題與年份的完整容器)
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            // 視窗高度設為 1400，確保底部年份被渲染
            await page.setViewportSize({ width: 1600, height: 1400 });
            try {
              console.log('1. 正在模擬真人進入...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(5000);
              
              await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'domcontentloaded', timeout: 90000 });
              
              if (!page.url().includes('m2-global')) {
                await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'domcontentloaded' });
              }

              console.log('2. 等待圖表完全渲染 (60秒)...');
              await page.waitForTimeout(60000); 

              // 智慧偵測：鎖定包含標題與年份的最外層容器
              const chart = await page.$('.chart-main-container') || await page.$('.chart-container') || await page.$('body');
              await chart.screenshot({ path: 'chart.png' });
              console.log('截圖儲存成功！');
            } catch (e) {
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF
          
          # 3. 執行腳本
          node screenshot.js

      - name: Post to Discord
        run: |
          # 訊息內容僅保留網址
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"https://bitcoincounterflow.comcharts/m2-global/\"}" ${{ secrets.DISCORD_WEBHOOK }}
