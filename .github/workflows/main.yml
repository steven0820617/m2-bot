name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            // 1. 強制設定為 2K 解析度 (2560x1440)，確保網頁佈局完全展開成大圖模式
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 2560, height: 1440 },
              deviceScaleFactor: 2 
            });
            const page = await context.newPage();
            page.setDefaultTimeout(90000);

            try {
              console.log('1. 直接進入圖表頁...');
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'networkidle' 
              });

              console.log('2. 注入 CSS 強制修復佈局並隱藏廣告彈窗...');
              await page.addStyleTag({ 
                content: `
                  /* 隱藏 Cookie 彈窗與不需要的側邊欄位，防止干擾截圖 */
                  .qc-cmp2-container, #qc-cmp2-container, .sidebar, .nav-menu { display: none !important; }
                  /* 強制主要圖表區域撐開，不要並排顯示 */
                  .chart-main-container { width: 100% !important; max-width: none !important; display: block !important; }
                  * { font-family: sans-serif !important; }
                ` 
              });

              console.log('3. 等待 Highcharts 線條動畫與 Canvas 渲染...');
              // 鎖定該網站最外層的圖表包裝盒
              const selector = '.chart-main-container';
              await page.waitForSelector(selector, { state: 'visible', timeout: 30000 });
              
              // 延長等待時間至 25 秒，確保所有國家的 M2 數據線條都畫完
              await page.waitForTimeout(25000);

              // 4. 執行精確截圖
              const chart = await page.$(selector);
              if (chart) {
                // 將滑鼠移到角落，避免觸發任何 Tooltip 擋住線條
                await page.mouse.move(0, 0); 
                await chart.screenshot({ 
                  path: 'chart.png', 
                  animations: 'disabled' 
                });
                console.log('成功擷取完整比例圖表！');
              } else {
                throw new Error('找不到圖表容器');
              }
            } catch (e) {
              console.error('報錯偵錯：' + e.message);
              // 失敗時抓全螢幕協助判斷原因
              await page.screenshot({ path: 'chart.png', fullPage: true });
            }
            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          if [ -f chart.png ]; then
            curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📈 **M2 Global Supply Growth 報告**\n\`https://bitcoincounterflow.com\`\"}" ${{ secrets.DISCORD_WEBHOOK }}
          else
            echo "找不到截圖。"
          fi
