name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 }
            });
            const page = await context.newPage();
            
            try {
              console.log('1. 先進入首頁以繞過重定向攔截...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
              await page.waitForTimeout(5000);

              console.log('2. 模擬跳轉至圖表頁面...');
              await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'domcontentloaded' });
              
              // 3. 關鍵：如果網址被踢回首頁，強制再跳一次
              let retries = 0;
              while (!page.url().includes('m2-global') && retries < 2) {
                console.log('檢測到跳轉回首頁，正在執行第 ' + (retries + 1) + ' 次嘗試進入目標頁面...');
                await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'domcontentloaded' });
                await page.waitForTimeout(5000);
                retries++;
              }

              console.log('3. 等待圖表區塊渲染 (30秒)...');
              const selector = '.chart-container';
              // 等待圖表元件出現在 HTML 中，但如果等不到也繼續執行（不報錯）
              await page.waitForSelector(selector, { timeout: 30000 }).catch(() => console.log('找不到特定元件，將進行全螢幕備份'));
              
              // 額外等待渲染時間
              await page.waitForTimeout(15000);

              console.log('4. 執行截圖...');
              const chart = await page.$(selector);
              if (chart && page.url().includes('m2-global')) {
                await chart.screenshot({ path: 'chart.png' });
                console.log('成功截取精確圖表區塊！');
              } else {
                // 最終保險：若找不到元件或被卡在首頁，截取整個當前畫面
                await page.screenshot({ path: 'chart.png' });
                console.log('定位失敗或仍處於錯誤頁面，已截取備份畫面供檢查。');
              }
            } catch (e) {
              console.error('執行過程中發生錯誤:', e.message);
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run
        run: node screenshot.js

      - name: Post
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表更新**\"}" ${{ secrets.DISCORD_WEBHOOK }}
