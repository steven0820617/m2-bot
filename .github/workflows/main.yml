name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 4'
  workflow_dispatch: # 方便您手動按按鈕測試

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install playwright
          # 關鍵：除了安裝 chromium，還必須安裝系統層級的依賴
          npx playwright install chromium
          npx playwright install-deps chromium
          
      - name: Run Screenshot Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 }
            });
            const page = await context.newPage();
            
            try {
              console.log('1. 進入首頁建立信任...');
              await page.goto('https://bitcoincounterflow.com/', { waitUntil: 'networkidle', timeout: 60000 });
              await page.waitForTimeout(5000);

              console.log('2. 修改網址跳轉至圖表頁面...');
              await page.evaluate(() => { window.location.href = 'https://bitcoincounterflow.com/charts/m2-global/'; });
              
              console.log('3. 等待頁面渲染 (60秒)...');
              await page.waitForTimeout(60000);
              await page.evaluate(() => window.scrollTo(0, 400));

              // 嘗試抓取圖表容器
              const chart = await page.$('.chart-main-container') || await page.$('.highcharts-container') || await page.$('.chart-container');
              
              if (chart && page.url().includes('m2-global')) {
                console.log('執行精確截圖...');
                await chart.screenshot({ path: 'chart.png' });
              } else {
                console.log('無法精確定位，改為全螢幕截圖...');
                await page.screenshot({ path: 'chart.png' });
              }
            } catch (e) {
              console.error('執行錯誤:', e.message);
              // 錯誤時至少留下一張截圖供 Debug
              await page.screenshot({ path: 'chart.png' });
            } finally {
              await browser.close();
            }
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always() # 確保截圖失敗也能看到回傳訊息（如果檔案存在的話）
        run: |
          curl -X POST -F "file=@chart.png" \
            -F "payload_json={\"content\": \"\`https://bitcoincounterflow.com/charts/m2-global/\`\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}
