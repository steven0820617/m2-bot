name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1400, height: 1200 });
            try {
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'domcontentloaded', timeout: 60000 });
              await page.waitForTimeout(40000); 
              const chart = await page.$('.chart-main-container') || await page.$('.chart-container') || await page.$('body');
              await chart.screenshot({ path: 'chart.png' });
            } catch (e) {
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run
        run: node screenshot.js

      - name: Post
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表**\"}" ${{ secrets.DISCORD_WEBHOOK }}
