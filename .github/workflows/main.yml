name: M2_Auto_Update

on:
  schedule:
    - cron: '0 0 * * 2' # 每週二 台北時間 08:00
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        env:
          TARGET_URL: https://bitcoincounterflow.com
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--disable-dev-shm-usage']
            });

            const OUT = 'chart.png';

            try {
              const context = await browser.newContext({
                viewport: { width: 1920, height: 1080 },
                deviceScaleFactor: 2,
                locale: 'zh-TW',
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
              });

              const page = await context.newPage();
              page.setDefaultTimeout(90000);

              console.log('1. Opening URL...');
              // 【優化 1】改用 domcontentloaded 配合長等待，避免 networkidle 過早觸發
              await page.goto(process.env.TARGET_URL, {
                waitUntil: 'domcontentloaded',
                timeout: 90000
              });

              console.log('2. Waiting for Highcharts rendering (25s)...');
              await page.waitForTimeout(25000);

              const selector = '.chart-main-container';
              const chartExists = await page.waitForSelector(selector, { state: 'visible', timeout: 15000 })
                .catch(() => {
                  console.log('Selector not found, switching to full page fallback.');
                  return null;
                });

              const chart = await page.$(selector);
              if (chart && chartExists) {
                console.log('3. Capturing element screenshot...');
                await page.mouse.move(0, 0);
                await chart.screenshot({ path: OUT, animations: 'disabled' });
              } else {
                console.log('3. Capturing full page screenshot...');
                await page.screenshot({ path: OUT, fullPage: true, animations: 'disabled' });
              }

              console.log('Success.');

            } catch (err) {
              console.error('Pipeline failed:', err);
              // 【優化 2】最後保底截圖：即便腳本報錯，也嘗試抓一張全螢幕圖發送
              try {
                const page = (await browser.pages())[0];
                if (page) {
                  await page.screenshot({ path: OUT, fullPage: true, animations: 'disabled' });
                  console.log('Final fallback screenshot taken.');
                }
              } catch (e) {
                console.error('Final fallback failed.');
              }
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

          node screenshot.js

      - name: Send to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TARGET_URL: https://bitcoincounterflow.com
        run: |
          if [ -s chart.png ]; then
            # 發送純網址內容
            curl --fail-with-body -sS \
              -F "file=@chart.png" \
              -F "payload_json={\"content\":\"${{ env.TARGET_URL }}\"}" \
              "$DISCORD_WEBHOOK"
          else
            echo "Error: No screenshot file found to upload."
            exit 1
          fi
