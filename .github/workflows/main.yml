name: M2_Auto_Update_Final_V9
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
        run: |
          # 1. 安裝環境
          npm install playwright
          npx playwright install chromium --with-deps
          
          # 2. 建立腳本 (鎖定最完整容器，並關閉 GPU 防止空白)
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ 
              args: ['--no-sandbox', '--disable-gpu', '--disable-software-rasterizer'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1400 }
            });
            const page = await context.newPage();
            try {
              console.log('正在導航至圖表頁面...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle', timeout: 90000 });
              
              // 模擬稍微捲動，觸發動態圖表與年份軸渲染
              await page.evaluate(() => window.scrollTo(0, 300));
              
              console.log('等待圖表數據加載 (60秒)...');
              await page.waitForTimeout(60000); 

              // 【智慧定位：鎖定包含標題、數據、年份的最完整容器】
              // 該網站通常使用 .chart-main-container 包裹所有圖表資訊
              const selector = '.chart-main-container, .chart-container, .highcharts-container';
              const chart = await page.locator(selector).first();
              
              console.log('執行精確區域截圖...');
              await chart.screenshot({ 
                path: 'chart.png',
                timeout: 0 // 防止字體載入過慢導致超時
              });
              console.log('截圖儲存成功！');
            } catch (e) {
              console.error('發生錯誤，改用全螢幕快照備份:', e.message);
              await page.screenshot({ path: 'chart.png', timeout: 0 });
            }
            await browser.close();
          })();
          EOF
          
          # 3. 執行腳本
          node screenshot.js

      - name: Post to Discord
        run: |
          # 只發送連結網址
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"https://bitcoincounterflow.com\"}" ${{ secrets.DISCORD_WEBHOOK }}
