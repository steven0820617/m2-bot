name: M2_Auto_Update

on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Capture screenshot
        env:
          TARGET_URL: https://bitcoincounterflow.com
        run: |
          cat > screenshot.js <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });
            const OUT = 'chart.png';
            let page;

            try {
              const context = await browser.newContext({
                viewport: { width: 1920, height: 1080 },
                deviceScaleFactor: 2,
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36'
              });

              page = await context.newPage();
              page.setDefaultTimeout(90000);

              console.log('1. 前往頁面...');
              await page.goto(process.env.TARGET_URL, { waitUntil: 'domcontentloaded', timeout: 90000 });

              // 【關鍵修正】確保圖表完全載入並等待渲染完成
              const selector = '.chart-main-container'; 
              await page.waitForSelector(selector, { state: 'visible', timeout: 30000 }).catch(() => null);
              await page.waitForTimeout(30000); // 增加等待時間至 30 秒，確保所有線條動畫跑完

              const chart = await page.$(selector);
              if (chart) {
                console.log('3. 執行精確局部截圖...');
                await page.mouse.move(0, 0); // 移開滑鼠避免 Tooltip 
                // 【關鍵參數】使用 chart.screenshot 且不帶其餘參數，這會精確抓取該 HTML 元素範圍
                await chart.screenshot({ path: OUT });
              } else {
                console.log('3. 找不到容器，保底全螢幕截圖...');
                await page.screenshot({ path: OUT, fullPage: true });
              }

            } catch (err) {
              if (page) await page.screenshot({ path: OUT, fullPage: true }).catch(() => {});
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF

          node screenshot.js

      - name: Send to Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TARGET_URL: https://bitcoincounterflow.com
        run: |
          if [ -s chart.png ]; then
            # 使用 < > 包圍網址，確保純網址無預覽
            curl --fail-with-body -sS \
              -F "file=@chart.png" \
              -F "payload_json={\"content\":\"<${{ env.TARGET_URL }}>\"}" \
              "$DISCORD_WEBHOOK"
          else
            exit 1
          fi
