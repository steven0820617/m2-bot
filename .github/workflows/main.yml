name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Create Script File
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 1000 });
            try {
              await page.goto('https://bitcoincounterflow.com/charts/m2-global/', { waitUntil: 'networkidle', timeout: 60000 });
              await new Promise(r => setTimeout(r, 15000)); // 等待 15 秒確保圖表渲染
              
              // 嘗試抓取圖表區域，若失敗則抓全網頁
              const chart = await page.$('.chart-container');
              if (chart) {
                await chart.screenshot({ path: 'chart.png' });
              } else {
                await page.screenshot({ path: 'chart.png' });
              }
            } catch (e) {
              console.error(e);
              await page.screenshot({ path: 'chart.png' }); // 發生錯誤也強制截圖看狀況
            }
            await browser.close();
          })();
          EOF

      - name: Run Screenshot Script
        run: node screenshot.js

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **最新 Global M2 vs Bitcoin 圖表**\"}" ${{ secrets.DISCORD_WEBHOOK }}
