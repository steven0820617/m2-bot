name: M2_Auto_Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Create Screenshot Script
        run: |
          echo "const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 800 });
            await page.goto('https://bitcoincounterflow.com');
            await page.waitForTimeout(10000); // 等待圖表跑出來
            const element = await page.$('.chart-container');
            await element.screenshot({ path: 'chart.png' });
            await browser.close();
          })();" > screenshot.js

      - name: Run Screenshot Script
        run: node screenshot.js

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **最新 Global M2 vs Bitcoin 圖表**\"}" ${{ secrets.DISCORD_WEBHOOK }}
