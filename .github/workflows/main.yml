name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 4'
  workflow_dispatch: 

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium
          
      - name: Run Screenshot Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-gpu'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1920, height: 1080 } 
            });
            const page = await context.newPage();
            
            try {
              console.log('1. 導航至圖表頁面...');
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'networkidle', 
                timeout: 90000 
              });

              console.log('2. 等待圖表完全渲染 (45秒)...');
              // 確保 Highcharts 核心節點已出現
              await page.waitForSelector('.highcharts-container', { timeout: 60000 });
              await page.waitForTimeout(45000); 

              // 3. 【精確截圖修正】
              // 該網站主圖表的容器通常是 .chart-main-container 
              // 透過 screenshot({ omitBackground: false }) 確保深色背景被完整抓取
              const chartElement = await page.$('.chart-main-container') || await page.$('.highcharts-container');
              
              if (chartElement) {
                console.log('執行精確區域截圖...');
                await chartElement.screenshot({ 
                  path: 'chart.png',
                  omitBackground: false // 保持黑色背景，防止透明
                });
                console.log('成功截取如範例所示之完整圖表！');
              } else {
                console.log('無法精確定位容器，改為全螢幕截圖...');
                await page.screenshot({ path: 'chart.png', fullPage: true });
              }
            } catch (e) {
              console.error('執行錯誤:', e.message);
              await page.screenshot({ path: 'chart.png' });
            } finally {
              await browser.close();
            }
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          curl -X POST -F "file=@chart.png" \
            -F "payload_json={\"content\": \"\`https://bitcoincounterflow.com\`\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}
