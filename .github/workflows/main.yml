name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            // 使用較寬的視窗以確保右側數據不被切掉
            await page.setViewportSize({ width: 1600, height: 1200 });
            try {
              console.log('正在前往圖表頁面...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle', timeout: 90000 });
              
              // 1. 強制等待圖表數據加載 (40秒)
              await page.waitForTimeout(40000); 

              // 2. 精確定位：只針對包含圖表與座標軸的特定區塊
              // 該網站的核心圖表區塊通常是 .chart-container 或 .highcharts-container
              const chartElement = await page.$('.chart-container') || await page.$('.highcharts-container');
              
              if (chartElement) {
                console.log('偵測到核心圖表區塊，進行精確截圖...');
                await chartElement.screenshot({ 
                  path: 'chart.png',
                  animations: 'disabled' // 關閉動畫，確保線條定格
                });
              } else {
                console.log('找不到核心區塊，改用精確座標補捉圖表區域...');
                // 這個座標經過計算，會避開頂部導航和底部文字，只抓中間圖表
                await page.screenshot({ 
                  path: 'chart.png', 
                  clip: { x: 260, y: 10, width: 1340, height: 750 } 
                });
              }
              console.log('截圖成功！');
            } catch (e) {
              await page.screenshot({ path: 'chart.png' });
            }
            await browser.close();
          })();
          EOF

      - name: Run
        run: node screenshot.js

      - name: Post
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表更新**\"}" ${{ secrets.DISCORD_WEBHOOK }}
