name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 4'
  workflow_dispatch:
    - cron: '0 0 * * 4' # 每週四 UTC 00:00 (台灣 08:00)
  workflow_dispatch:   # 允許點擊按鈕手動測試

jobs:
  screenshot:
@@ -11,55 +11,65 @@ jobs:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install playwright
          npm install playwright-chromium
          npx playwright install chromium --with-deps
          

      - name: Generate Screenshot
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          const { chromium } = require('playwright-chromium');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const browser = await chromium.launch({ 
              headless: true,
              args: ['--disable-blink-features=AutomationControlled'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 }
            });
            const page = await context.newPage();
            
            try {
              console.log('1. 先進入首頁以獲得伺服器信任...');
              await page.goto('https://bitcoincounterflow.com/', { waitUntil: 'networkidle' });
              console.log('1. 訪問首頁...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(5000);

              console.log('2. 【關鍵修正】從瀏覽器內部強行跳轉到圖表頁...');
              // 這裡不使用 API 請求，而是直接修改瀏覽器的網址位置，模擬真人點擊
              await page.evaluate(() => { window.location.href = 'https://bitcoincounterflow.com/charts/m2-global/'; });
              console.log('2. 跳轉至圖表頁...');
              await page.evaluate(() => { window.location.href = 'https://bitcoincounterflow.comcharts/m2-global/'; });
              
              console.log('3. 等待頁面穩定與數據渲染 (60秒)...');
              // 延長等待時間，確保 Canvas 繪圖完成
              console.log('3. 等待圖表渲染 (60秒)...');
              await page.waitForTimeout(60000); 

              // 檢查目前網址是否正確
              console.log('目前所在網址：' + page.url());

              // 4. 定位包含標題、數據、年份的最外層容器
              // 4. 定位圖表並截圖
              const chart = await page.$('.chart-main-container') || await page.$('.chart-container') || await page.$('.highcharts-container');
              
              if (chart && page.url().includes('m2-global')) {
              if (chart) {
                await chart.screenshot({ path: 'chart.png' });
                console.log('成功截取完整圖表區域！');
              } else {
                // 若定位失敗或被踢回，截取全螢幕供檢查
                await page.screenshot({ path: 'chart.png' });
                await page.screenshot({ path: 'chart.png', fullPage: true });
              }
            } catch (e) {
              await page.screenshot({ path: 'chart.png' });
              await page.screenshot({ path: 'chart.png', fullPage: true });
            } finally {
              await browser.close();
            }
            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          # 網址前後加上 ` 符號，防止產生超連結與預覽
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"\`https://bitcoincounterflow.com/charts/m2-global/\`\"}" ${{ secrets.DISCORD_WEBHOOK }}
          if [ -f chart.png ]; then
            # 僅發送純文字網址與截圖檔案
            curl -X POST \
              -F "file=@chart.png" \
              -F "payload_json={\"content\": \"https://bitcoincounterflow.comcharts/m2-global/\"}" \
              ${{ secrets.DISCORD_WEBHOOK }}
          fi
