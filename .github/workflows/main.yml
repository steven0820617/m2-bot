name: M2_Auto_Update_Wide
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get install -y imagemagick

      - name: Capture Page
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ args: ['--no-sandbox', '--disable-gpu'] });
            const page = await browser.newPage();
            // 設定超大視窗，確保圖表橫向展開
            await page.setViewportSize({ width: 1600, height: 1200 });
            try {
              console.log('1. 前往圖表網址...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle', timeout: 90000 });
              
              // 2. 模擬稍微捲動，並等待 45 秒讓動態數據渲染
              await page.evaluate(() => window.scrollTo(0, 150));
              await page.waitForTimeout(45000); 
              
              // 3. 截取原始全螢幕圖
              await page.screenshot({ path: 'full.png' });
              console.log('原始截圖成功');
            } catch (e) {
              await page.screenshot({ path: 'full.png' });
            }
            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Crop Large Area
        run: |
          # 裁切出 1400x900 的大範圍，從左邊 200, 上邊 80 的位置開始
          # 這會包含標題、完整圖表、數值標籤與時間軸
          convert full.png -crop 1400x900+200+80 chart.png
          echo "大範圍裁切完成"

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 每日自動更新 (大範圍版)**\"}" ${{ secrets.DISCORD_WEBHOOK }}
