name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            // 設定大視窗
            await page.setViewportSize({ width: 1600, height: 1200 });
            
            try {
              console.log('1. 嘗試進入圖表網址...');
              // 使用更高的超時限制 (60秒) 且只要 DOM 載入就開始
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'domcontentloaded', 
                timeout: 60000 
              });

              // 2. 解決「跳回首頁」問題：如果網址不對，強制再跳一次並等待
              for (let i = 0; i < 2; i++) {
                if (!page.url().includes('m2-global')) {
                  console.log('檢測到跳轉，重新導向目標頁面...');
                  await page.goto('https://bitcoincounterflow.com', { waitUntil: 'domcontentloaded' });
                  await page.waitForTimeout(5000);
                }
              }

              console.log('2. 等待圖表元件出現...');
              // 針對圖表容器進行等待
              const selector = '.chart-container';
              await page.waitForSelector(selector, { timeout: 60000 });
              
              // 3. 額外給 15 秒讓動態數據線條完全畫出來
              await page.waitForTimeout(15000);

              console.log('3. 執行精確截圖...');
              const chart = await page.$(selector);
              // 設定截圖不限制時間 (timeout: 0)，防止字體載入太慢導致報錯
              await chart.screenshot({ path: 'chart.png', timeout: 0 });
              console.log('成功截取圖表！');
              
            } catch (e) {
              console.error('發生錯誤，嘗試備份截圖:', e.message);
              await page.screenshot({ path: 'chart.png', timeout: 0 });
            }
            await browser.close();
          })();
          EOF

      - name: Run
        run: node screenshot.js

      - name: Post
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC 最新圖表更新**\"}" ${{ secrets.DISCORD_WEBHOOK }}
