name: M2_Auto_Update_Final_V3
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          sudo apt-get install -y imagemagick

      - name: Capture Page
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ 
              args: ['--no-sandbox', '--disable-gpu'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1400 }
            });
            const page = await context.newPage();
            try {
              console.log('1. 快速進入網頁...');
              // 使用 domcontentloaded 縮短等待時間
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'domcontentloaded', 
                timeout: 60000 
              });

              // 2. 二次檢查，如果被踢回首頁，強制跳轉
              if (!page.url().includes('m2-global')) {
                await page.goto('https://bitcoincounterflow.com', { waitUntil: 'domcontentloaded' });
              }

              // 3. 給予 40 秒讓動態數據線條畫出來（這部分不能省）
              console.log('等待數據繪製 (40s)...');
              await page.waitForTimeout(40000); 

              // 4. 關鍵：設定截圖超時為 0 (無視字體載入)
              await page.screenshot({ path: 'full.png', timeout: 0 });
              console.log('截圖儲存成功！');
            } catch (e) {
              console.error('報錯:', e.message);
              await page.screenshot({ path: 'full.png', timeout: 0 });
            }
            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Crop Full Area
        run: |
          # 裁切：寬1400x高1100，左偏200, 上偏20 (包含標題、數據、年份)
          convert full.png -crop 1400x1100+200+20 chart.png
          echo "完整範圍裁切完成"

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **Global M2 vs BTC**\"}" ${{ secrets.DISCORD_WEBHOOK }}
