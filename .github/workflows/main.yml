name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 4'
  workflow_dispatch: 

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium
          
      - name: Run Screenshot Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 2560, height: 1440 } // 使用 2K 寬度確保圖表橫向不擁擠
            });
            const page = await context.newPage();
            
            try {
              console.log('1. 進入首頁建立 Session...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle', timeout: 60000 });
              await page.waitForTimeout(5000);

              console.log('2. 修改網址跳轉至圖表頁面...');
              await page.evaluate(() => { window.location.href = 'https://bitcoincounterflow.comcharts/m2-global/'; });
              
              console.log('3. 等待頁面穩定渲染 (60秒)...');
              // 等待 Highcharts 核心繪圖區出現
              await page.waitForSelector('.highcharts-container', { timeout: 60000 });
              await page.waitForTimeout(60000); 
              await page.evaluate(() => window.scrollTo(0, 300)); // 輕微捲動避開頂部資訊欄

              // 4. 精確抓取「圖表主體」容器，這會包含標題、年份座標、數值，並自動排除左側 Sidebar
              const chart = await page.$('.chart-container') || await page.$('.chart-main-container') || await page.$('.highcharts-container');
              
              if (chart && page.url().includes('m2-global')) {
                console.log('執行精確區域截圖...');
                await chart.screenshot({ path: 'chart.png' });
              } else {
                console.log('定位失敗，截取全螢幕供檢查...');
                await page.screenshot({ path: 'chart.png' });
              }
            } catch (e) {
              console.error('執行錯誤:', e.message);
              await page.screenshot({ path: 'chart.png' });
            } finally {
              await browser.close();
            }
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          curl -X POST -F "file=@chart.png" \
            -F "payload_json={\"content\": \"\`https://bitcoincounterflow.comcharts/m2-global/\`\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}
