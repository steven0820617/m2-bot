name: M2_Auto_Update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Screenshot Script
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 1000 });
            await page.goto('https://bitcoincounterflow.com', { waitUntil: 'networkidle' });
            await new Promise(r => setTimeout(r, 10000)); // 等待圖表加載
            
            // 找到圖表區塊並截圖
            const chart = await page.$('.chart-container');
            if (chart) {
              await chart.screenshot({ path: 'chart.png' });
            } else {
              await page.screenshot({ path: 'chart.png', fullPage: true });
            }
            await browser.close();
          })();"

      - name: Post to Discord
        run: |
          curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"📊 **最新 Global M2 vs Bitcoin 圖表**\"}" ${{ secrets.DISCORD_WEBHOOK }}
