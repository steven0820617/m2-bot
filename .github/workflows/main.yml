name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 4'
  workflow_dispatch: 

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium
          
      - name: Run Screenshot Script
        run: |
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ 
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-web-security'] 
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 2560, height: 1440 },
              deviceScaleFactor: 2 // 提高縮放比例，防止畫布渲染空白
            });
            const page = await context.newPage();
            
            try {
              console.log('1. 直接導航至圖表頁面...');
              // 使用 networkidle 確保數據請求已完成
              await page.goto('https://bitcoincounterflow.com', { 
                waitUntil: 'networkidle', 
                timeout: 90000 
              });

              console.log('2. 等待圖表 SVG 渲染...');
              // 等待 highcharts 繪圖核心出現
              await page.waitForSelector('.highcharts-root', { timeout: 60000 });
              
              console.log('3. 額外等待數據填充 (30秒)...');
              await page.waitForTimeout(30000); 

              // 4. 精確抓取圖表區域 (排除側邊欄)
              const chart = await page.$('.highcharts-container') || await page.$('.chart-container');
              
              if (chart) {
                console.log('執行精確區域截圖...');
                await chart.screenshot({ path: 'chart.png' });
              } else {
                console.log('找不到容器，截取全螢幕備份...');
                await page.screenshot({ path: 'chart.png', fullPage: true });
              }
            } catch (e) {
              console.error('執行錯誤:', e.message);
              await page.screenshot({ path: 'chart.png' });
            } finally {
              await browser.close();
            }
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          curl -X POST -F "file=@chart.png" \
            -F "payload_json={\"content\": \"\`https://bitcoincounterflow.com\`\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}
