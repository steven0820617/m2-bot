name: M2_Auto_Update
on:
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Run
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
          
          cat << 'EOF' > screenshot.js
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
              viewport: { width: 1600, height: 1200 }
            });
            const page = await context.newPage();
            page.setDefaultTimeout(90000);

            try {
              console.log('1. 進入首頁建立連線...');
              await page.goto('https://bitcoincounterflow.com', { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(5000);

              console.log('2. 前往 M2 圖表頁...');
              // 改回更穩定的直接跳轉，並等待 DOM 載入
              await page.goto('https://bitcoincounterflow.comcharts/m2-global/', { waitUntil: 'domcontentloaded' });
              
              console.log('3. 強制注入 CSS 確保字體不卡住...');
              await page.addStyleTag({ content: `* { font-family: sans-serif !important; }` });

              console.log('4. 關鍵：等待圖表元件出現...');
              // 確保頁面不是白的，至少要看到一個圖表容器
              const selector = '.chart-main-container, .chart-container, .highcharts-container';
              await page.waitForSelector(selector, { state: 'visible', timeout: 30000 });
              
              console.log('5. 額外等待 10 秒讓畫布渲染完成...');
              await page.waitForTimeout(10000);

              const chart = await page.$(selector);
              if (chart) {
                await chart.screenshot({ path: 'chart.png', animations: 'disabled' });
                console.log('成功擷取圖表！');
              } else {
                throw new Error('找不到圖表容器');
              }
            } catch (e) {
              console.error('偵錯：' + e.message);
              // 如果失敗，抓一張全螢幕照片看看畫面上到底是什麼（避免又是白的）
              await page.screenshot({ path: 'chart.png', fullPage: true });
            }
            await browser.close();
          })();
          EOF
          node screenshot.js

      - name: Post to Discord
        if: always()
        run: |
          if [ -f chart.png ]; then
            curl -X POST -F "file=@chart.png" -F "payload_json={\"content\": \"\`https://bitcoincounterflow.comcharts/m2-global/\`\"}" ${{ secrets.DISCORD_WEBHOOK }}
          else
            echo "No screenshot found."
          fi
